<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Startlocatie Overzicht Adviseurs</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
  :root{
    --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --bg:#f1f5f9;
    --cb:#1d4ed8; --gw:#ea580c; --ok:#16a34a; --bad:#dc2626;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); background:var(--bg);
  }
  #app{display:flex; height:100vh; width:100vw; overflow:hidden}
  /* ---- Sidebar ---- */
  #side{
    width:400px; min-width:400px; height:100%; background:#fff;
    border-right:1px solid var(--line); overflow-y:auto;
    display:flex; flex-direction:column;
  }
  .pad{padding:20px 22px}
  h1{font-size:1.45rem; line-height:1.2; margin:0 0 4px}
  .sub{color:var(--muted); font-size:.9rem; margin:0}
  .legend{display:flex; gap:14px; flex-wrap:wrap; margin-top:14px;
    background:var(--bg); border:1px solid var(--line); border-radius:12px; padding:12px 14px}
  .legend .item{display:flex; align-items:center; gap:8px; font-size:.9rem; font-weight:600}
  .dot{width:16px; height:16px; border-radius:50%; flex:0 0 auto}
  .dot.cb{background:var(--cb)} .dot.gw{background:var(--gw)}

  /* ---- Search ---- */
  .search{border-top:1px solid var(--line)}
  .search label{display:block; text-align:center; font-weight:700; font-size:1.05rem; margin-bottom:10px}
  #pc{
    width:100%; text-align:center; font-size:2rem; font-weight:700; letter-spacing:.18em;
    padding:16px 12px; border:2px solid var(--line); border-radius:14px; outline:none;
    color:var(--ink);
  }
  #pc:focus{border-color:var(--cb); box-shadow:0 0 0 4px rgba(29,78,216,.12)}
  .btns{display:flex; flex-direction:column; gap:10px; margin-top:12px}
  button{font:inherit; cursor:pointer; border:none; border-radius:12px; padding:14px; font-weight:700; font-size:1.05rem}
  #go{background:var(--ok); color:#fff}
  #go:hover{background:#15803d}
  #clr{background:#fff; color:var(--muted); border:2px solid var(--line)}
  #clr:hover{background:var(--bg)}

  /* ---- Results ---- */
  #results{padding:0 22px}
  .bar{border-radius:12px; padding:13px 16px; font-weight:700; color:#fff; margin-bottom:14px; text-align:center; font-size:1.05rem}
  .bar.ok{background:var(--ok)} .bar.bad{background:var(--bad)}
  .card{border:1px solid var(--line); border-radius:14px; padding:13px 15px; margin-bottom:10px; position:relative; background:#fff}
  .card.top{border-color:var(--ok); box-shadow:0 0 0 3px rgba(22,163,74,.12)}
  .card .name{font-weight:700; font-size:1.08rem}
  .card .dist{color:var(--muted); font-size:.92rem; margin-top:2px}
  .card .meta{display:flex; align-items:center; gap:8px; margin-top:9px}
  .pill{display:inline-block; padding:3px 10px; border-radius:999px; color:#fff; font-size:.78rem; font-weight:700}
  .pill.cb{background:var(--cb)} .pill.gw{background:var(--gw)}
  .town{color:var(--muted); font-size:.9rem}
  .badge{position:absolute; top:-9px; right:12px; background:var(--ok); color:#fff; font-size:.72rem; font-weight:800;
    padding:3px 10px; border-radius:999px; letter-spacing:.03em}

  /* ---- Overview ---- */
  details.ov{border-top:1px solid var(--line); margin-top:6px}
  details.ov>summary{list-style:none; cursor:pointer; padding:16px 22px; font-weight:700; font-size:1.02rem;
    display:flex; align-items:center; justify-content:space-between}
  details.ov>summary::-webkit-details-marker{display:none}
  details.ov>summary .chev{transition:transform .2s; color:var(--muted)}
  details.ov[open]>summary .chev{transform:rotate(180deg)}
  .ovbody{padding:0 22px 24px}
  .grp{border-radius:12px; overflow:hidden; border:1px solid var(--line); margin-bottom:16px}
  .grp .head{padding:10px 14px; color:#fff; font-weight:800; font-size:1rem}
  .grp.cb .head{background:var(--cb)} .grp.gw .head{background:var(--gw)}
  .adv{padding:11px 14px; border-top:1px solid var(--line); cursor:pointer}
  .adv:hover{background:var(--bg)}
  .adv .top{display:flex; align-items:center; gap:8px}
  .adv .swatch{width:13px;height:13px;border-radius:3px;flex:0 0 auto}
  .adv .an{font-weight:700}
  .adv .at{color:var(--muted); font-size:.86rem}
  .adv .areas{margin-top:6px; font-size:.82rem; color:var(--muted); line-height:1.5}
  .adv .areas b{color:var(--ink); font-weight:700}

  /* ---- Map ---- */
  #map{flex:1; height:100%}
  .pcpin{display:flex; align-items:center; justify-content:center}
  .pcpin .pin{width:26px;height:26px;border-radius:50% 50% 50% 0; background:var(--bad);
    transform:rotate(-45deg); border:3px solid #fff; box-shadow:0 2px 6px rgba(0,0,0,.4)}
  .leaflet-tooltip.adv-tip{font-weight:700}
  .hint{color:var(--muted); font-size:.85rem; text-align:center; padding:4px 0 14px}

  /* ---- Responsive ---- */
  @media (max-width:760px){
    #app{flex-direction:column}
    #side{width:100%; min-width:0; height:auto; max-height:55%; border-right:none; border-bottom:1px solid var(--line)}
    #map{height:45vh; min-height:280px}
  }
</style>
</head>
<body>
<div id="app">
  <aside id="side">
    <div class="pad">
      <h1>Startlocatie Overzicht Adviseurs</h1>
      <p class="sub">Dekkingskaart &mdash; 50 km rond elke startlocatie</p>
      <div class="legend">
        <div class="item"><span class="dot cb"></span> blauw = ConsumentenBesparing</div>
        <div class="item"><span class="dot gw"></span> oranje = GroeneWijzer</div>
      </div>
    </div>

    <div class="search pad">
      <label for="pc">Zoek adviseur op postcode</label>
      <input id="pc" inputmode="text" maxlength="8" placeholder="1234 AB" autocomplete="off" autocapitalize="characters" spellcheck="false" />
      <div class="btns">
        <button id="go">Zoek adviseur</button>
        <button id="clr">Wissen</button>
      </div>
      <div class="hint">Typ een postcode, bijv. 1217 AB (cijfers volstaan)</div>
    </div>

    <div id="results"></div>

    <details class="ov">
      <summary>Alle adviseurs &amp; gebieden bekijken <span class="chev">&#9662;</span></summary>
      <div class="ovbody" id="ovbody"></div>
    </details>
  </aside>
  <div id="map"></div>
</div>

const CB_COLORS = ["#1d4ed8","#2563eb","#3b82f6","#1e40af","#0ea5e9","#0284c7","#0369a1","#4f46e5","#4338ca","#6366f1","#0891b2","#075985"];
const GW_COLORS = ["#ea580c","#f97316","#dc2626","#d97706","#b45309","#c2410c","#e11d48"];
const RADIUS_KM = 50;

/* assign a colour per adviser by order within its portal */
(function assignColors(){
  let ci=0, gi=0;
  for(const a of ADVISERS){
    if(a.portal==="CB"){ a.color = CB_COLORS[ci % CB_COLORS.length]; ci++; }
    else { a.color = GW_COLORS[gi % GW_COLORS.length]; gi++; }
  }
})();

/* ======= MATH ======= */
function haversine(lat1,lon1,lat2,lon2){
  const R=6371, toR=Math.PI/180;
  const dLat=(lat2-lat1)*toR, dLon=(lon2-lon1)*toR;
  const a=Math.sin(dLat/2)**2 + Math.cos(lat1*toR)*Math.cos(lat2*toR)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}

/* PC2 areas within 50km: include a 2-digit area if >=30% of its PC4 codes fall inside */
const PC2_CACHE = {};
function pc2Areas(adv){
  if(PC2_CACHE[adv.name]) return PC2_CACHE[adv.name];
  const tot={}, ins={};
  for(const pc in PC4){
    const c=PC4[pc], k=pc.slice(0,2);
    tot[k]=(tot[k]||0)+1;
    if(haversine(c[0],c[1],adv.lat,adv.lon) <= RADIUS_KM) ins[k]=(ins[k]||0)+1;
  }
  const out=[];
  for(const k in tot){ if((ins[k]||0)/tot[k] >= 0.30) out.push(k); }
  out.sort();
  PC2_CACHE[adv.name]=out;
  return out;
}

/* ======= MAP ======= */
const map = L.map('map',{zoomControl:true}).setView([52.15,5.3], 8);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains:'abcd', maxZoom:19
}).addTo(map);

const NL_BOUNDS = L.latLngBounds([50.7,3.3],[53.6,7.25]);

/* draw circles + centre dots */
ADVISERS.forEach(a=>{
  a.circle = L.circle([a.lat,a.lon],{
    radius:RADIUS_KM*1000, color:a.color, weight:2, opacity:.85,
    fillColor:a.color, fillOpacity:.10
  }).addTo(map);
  a.dot = L.circleMarker([a.lat,a.lon],{
    radius:5, color:'#fff', weight:2, fillColor:a.color, fillOpacity:1
  }).addTo(map).bindTooltip(`${a.name} &mdash; ${a.town}`,{className:'adv-tip',direction:'top'});
  const focus=()=>focusAdviser(a);
  a.circle.on('click',focus); a.dot.on('click',focus);
});

function styleNormal(){
  ADVISERS.forEach(a=>{
    a.circle.setStyle({opacity:.85, fillOpacity:.10, weight:2});
    a.dot.setStyle({opacity:1, fillOpacity:1});
  });
}
function styleHighlight(names){
  const set = new Set(names);
  ADVISERS.forEach(a=>{
    if(set.has(a.name)){
      a.circle.setStyle({opacity:1, fillOpacity:.28, weight:3});
      a.dot.setStyle({opacity:1, fillOpacity:1});
      a.circle.bringToFront();
    }else{
      a.circle.setStyle({opacity:.18, fillOpacity:.03, weight:1});
      a.dot.setStyle({opacity:.35, fillOpacity:.35});
    }
  });
}

let pcMarker=null;
function placePin(lat,lon){
  if(pcMarker) map.removeLayer(pcMarker);
  pcMarker = L.marker([lat,lon],{icon:L.divIcon({className:'pcpin', html:'<div class="pin"></div>', iconSize:[26,26], iconAnchor:[13,24]})}).addTo(map);
}

/* ======= SEARCH ======= */
const resEl = document.getElementById('results');
const pcInput = document.getElementById('pc');

function doSearch(){
  const digits = (pcInput.value.match(/\d/g)||[]).join('').slice(0,4);
  if(digits.length<4){
    resEl.innerHTML = `<div class="bar bad">Vul een postcode van 4 cijfers in</div>`;
    return;
  }
  const loc = PC4[digits];
  if(!loc){
    resEl.innerHTML = `<div class="bar bad">Postcode ${digits} niet gevonden</div>`;
    return;
  }
  const [lat,lon]=loc;
  placePin(lat,lon);
  map.setView([lat,lon], 11, {animate:true});

  const found = ADVISERS
    .map(a=>({a, d:haversine(lat,lon,a.lat,a.lon)}))
    .filter(x=>x.d<=RADIUS_KM)
    .sort((x,y)=>x.d-y.d);

  if(found.length===0){
    styleNormal();
    resEl.innerHTML = `<div class="bar bad">Geen adviseur beschikbaar op ${digits}</div>`;
    return;
  }
  styleHighlight(found.map(x=>x.a.name));

  let html = `<div class="bar ok">${found.length} ${found.length===1?'adviseur':'adviseurs'} beschikbaar op ${digits}</div>`;
  found.forEach((x,i)=>{
    const a=x.a, cls=a.portal==='CB'?'cb':'gw';
    const label=a.portal==='CB'?'ConsumentenBesparing':'GroeneWijzer';
    html += `
      <div class="card${i===0?' top':''}">
        ${i===0?'<span class="badge">Dichtstbij</span>':''}
        <div class="name">${a.name}</div>
        <div class="dist">&plusmn; ${Math.round(x.d)} km van de afspraak</div>
        <div class="meta"><span class="pill ${cls}">${label}</span><span class="town">vanuit ${a.town}</span></div>
      </div>`;
  });
  resEl.innerHTML = html;
}

function clearAll(){
  pcInput.value='';
  resEl.innerHTML='';
  if(pcMarker){ map.removeLayer(pcMarker); pcMarker=null; }
  styleNormal();
  map.fitBounds(NL_BOUNDS,{padding:[20,20]});
  pcInput.focus();
}

function focusAdviser(a){
  styleHighlight([a.name]);
  map.fitBounds(a.circle.getBounds(),{padding:[30,30]});
}

document.getElementById('go').addEventListener('click', doSearch);
document.getElementById('clr').addEventListener('click', clearAll);
pcInput.addEventListener('keydown', e=>{ if(e.key==='Enter') doSearch(); });

/* ======= OVERVIEW ======= */
function buildOverview(){
  const body=document.getElementById('ovbody');
  const groups=[
    {portal:'CB', cls:'cb', title:'ConsumentenBesparing'},
    {portal:'GW', cls:'gw', title:'GroeneWijzer'}
  ];
  let html='';
  for(const g of groups){
    const list=ADVISERS.filter(a=>a.portal===g.portal);
    html+=`<div class="grp ${g.cls}"><div class="head">${g.title} &mdash; ${list.length} adviseurs</div>`;
    for(const a of list){
      const areas=pc2Areas(a);
      const areaTxt = areas.length ? areas.map(x=>`<b>${x}</b>`).join(' &middot; ') : '&mdash;';
      html+=`<div class="adv" data-name="${a.name}">
        <div class="top"><span class="swatch" style="background:${a.color}"></span>
          <span class="an">${a.name}</span><span class="at">&mdash; ${a.town}</span></div>
        <div class="areas">Postcodegebieden binnen 50 km: ${areaTxt}</div>
      </div>`;
    }
    html+=`</div>`;
  }
  body.innerHTML=html;
  body.querySelectorAll('.adv').forEach(el=>{
    el.addEventListener('click',()=>{
      const a=ADVISERS.find(x=>x.name===el.dataset.name);
      if(a) focusAdviser(a);
    });
  });
}
buildOverview();

/* start view */
map.fitBounds(NL_BOUNDS,{padding:[20,20]});
</script>
